# 推送到 main 时构建并将 examples + dist 部署到 GitHub Pages
# 页面地址：https://<username>.github.io/utm-track/
name: Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "rollup.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install and build
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p deploy/dist
          cp -r dist/* deploy/dist/
          sed 's|../dist/|dist/|g' examples/index.html > deploy/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
